<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Limited Drops</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: red;
      border: none;
      border-radius: 10px;
      color: white;
      width: 100%;
    }
  </style>
</head>

<body>

<h1>🔥 Limited Drops</h1>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <p>LV Bag</p>
    <button class="btn" onclick="buy()">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <p>Rolex Watch</p>
    <button class="btn" onclick="buy()">Buy</button>
  </div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function buy() {
  tg.openTelegramLink("https://t.me/luxuryrussians");
}
</script>

</body>
</html>
